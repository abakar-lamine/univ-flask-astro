{% extends 'layout.html' %}

{% block title %}Connexion - AstroSpace{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0" style="box-shadow: var(--astro-card-shadow); border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-rocket-takeoff" style="font-size: 3rem; color: var(--astro-accent);"></i>
                    <h2 class="fw-bold mt-2">Connexion</h2>
                    <p class="text-muted">Accédez à votre espace d'observation</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Votre identifiant" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Votre mot de passe" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background-color: var(--astro-blue); border: none; border-radius: 8px;">
                        Se connecter
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Nouveau parmi nous ?</span>
                    <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color: var(--astro-accent);">Créer un compte</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
