{% extends 'layout.html' %}

{% block title %}Inscription - AstroSpace{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0" style="box-shadow: var(--astro-card-shadow); border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill" style="font-size: 3rem; color: var(--astro-blue);"></i>
                    <h2 class="fw-bold mt-2">Créer un compte</h2>
                    <p class="text-muted">Rejoignez la communauté AstroSpace</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="nom" class="form-label fw-semibold">Nom complet</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                            <input type="text" class="form-control" id="nom" name="nom" placeholder="Ex: Galilée" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-at"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Identifiant unique" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Mot de passe sécurisé" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background-color: var(--astro-blue); border: none; border-radius: 8px;">
                        S'inscrire
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Vous avez déjà un compte ?</span>
                    <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold" style="color: var(--astro-accent);">Se connecter</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
